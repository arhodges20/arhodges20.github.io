<head>

  <style>
    /* Notebook app skin — hooks match the classes/IDs used by notebook-renderer.js */
    .notebook-layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 2rem;
      align-items: start;
      padding: 2.5rem 0 4rem;
    }
    .notebook-layout.sidebar-collapsed { grid-template-columns: minmax(0, 1fr); }
    .notebook-layout.sidebar-collapsed .notebook-sidebar-col { display: none; }

    .notebook-sidebar {
      position: sticky;
      top: 84px;
      max-height: calc(100vh - 108px);
      overflow-y: auto;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 1.25rem 0;
      scrollbar-width: thin;
      scrollbar-color: var(--line) transparent;
    }
    .notebook-sidebar::-webkit-scrollbar { width: 6px; }
    .notebook-sidebar::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

    .github-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: calc(100% - 2rem);
      margin: 0 1rem 1.25rem;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--ink);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0.55rem 1rem;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .github-link:hover { border-color: var(--accent); background: var(--accent-dim); }

    .notebook-nav { list-style: none; padding: 0; margin: 0; }
    .notebook-nav-item { margin-bottom: 0.15rem; }
    .notebook-nav-section { margin-bottom: 1.25rem; }
    .notebook-nav-section-title {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--faint);
      padding: 0.75rem 1.25rem 0.4rem;
    }
    .notebook-nav-link {
      display: flex;
      align-items: center;
      color: var(--muted);
      text-decoration: none;
      padding: 0.5rem 1.25rem;
      font-size: 0.92rem;
      border-left: 2px solid transparent;
      transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    }
    .notebook-nav-link:hover {
      color: var(--ink);
      background: var(--accent-dim);
      border-left-color: var(--accent);
    }
    .notebook-nav-link.active {
      color: var(--accent);
      background: var(--accent-dim);
      border-left-color: var(--accent);
      font-weight: 600;
    }
    .notebook-nav-link i { margin-right: 0.7rem; width: 18px; font-size: 0.85rem; opacity: 0.7; }
    .notebook-nav-link.active i, .notebook-nav-link:hover i { opacity: 1; }
    .notebook-nav-folder-toggle { margin-left: auto; font-size: 0.7rem; opacity: 0.5; transition: transform 0.2s ease; }
    .notebook-nav-folder-toggle.collapsed { transform: rotate(-90deg); }
    .notebook-nav-sub { list-style: none; padding: 0; margin: 0.15rem 0 0; max-height: 1000px; overflow: hidden; transition: max-height 0.3s ease, opacity 0.3s ease; opacity: 1; }
    .notebook-nav-sub.collapsed { max-height: 0; opacity: 0; margin: 0; }
    .notebook-nav-sub .notebook-nav-link { font-size: 0.87rem; padding-left: 2.4rem; }
    .notebook-nav-sub-sub .notebook-nav-link { font-size: 0.82rem; padding-left: 3.4rem; }

    .notebook-content {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 2rem 2.5rem 2.5rem;
      min-height: 60vh;
    }

    .sidebar-toggle-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 8px;
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.15s ease, border-color 0.15s ease;
      margin-bottom: 1.25rem;
    }
    .sidebar-toggle-btn:hover { color: var(--accent); border-color: var(--accent); }

    .breadcrumb-nav {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--faint);
      margin-bottom: 1.75rem;
    }
    .breadcrumb-nav a { color: var(--muted); text-decoration: none; }
    .breadcrumb-nav a:hover { color: var(--accent); }

    /* Rendered markdown */
    .markdown-content h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 0 0 1.25rem;
      padding-bottom: 0.6rem;
      border-bottom: 2px solid var(--accent);
    }
    .markdown-content h2 { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; margin: 2rem 0 0.9rem; }
    .markdown-content h3 { font-family: var(--font-display); font-size: 1.2rem; font-weight: 600; margin: 1.5rem 0 0.7rem; color: var(--accent); }
    .markdown-content h4, .markdown-content h5, .markdown-content h6 { font-family: var(--font-display); font-size: 1.05rem; font-weight: 600; margin: 1.25rem 0 0.5rem; }
    .markdown-content p { color: var(--muted); line-height: 1.75; margin: 0 0 1rem; }
    .markdown-content strong { color: var(--ink); }
    .markdown-content ul, .markdown-content ol { color: var(--muted); padding-left: 1.6rem; margin: 0 0 1.1rem; }
    .markdown-content li { margin-bottom: 0.45rem; line-height: 1.7; }
    .markdown-content li::marker { color: var(--accent); }
    .markdown-content a { color: var(--accent); }
    .markdown-content code {
      font-family: var(--font-mono);
      font-size: 0.86em;
      color: var(--accent);
      background: var(--accent-dim);
      border-radius: 4px;
      padding: 0.12em 0.4em;
    }
    .markdown-content pre {
      background: #0b1014;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin: 0 0 1.4rem;
    }
    .markdown-content pre code { background: none; color: #cfe3c9; padding: 0; font-size: 0.88rem; }
    .markdown-content table { width: 100%; border-collapse: collapse; margin: 0 0 1.5rem; font-size: 0.92rem; }
    .markdown-content th {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--faint);
      text-align: left;
      padding: 0.6rem 0.9rem;
      border-bottom: 1px solid var(--accent);
    }
    .markdown-content td { padding: 0.65rem 0.9rem; border-bottom: 1px solid var(--line); color: var(--muted); }
    .markdown-content tr:hover td { background: var(--surface-2); }
    .markdown-content hr { border: none; border-top: 1px solid var(--line); margin: 2rem 0; }
    .markdown-content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      margin: 1.5rem 0;
      color: var(--muted);
      font-style: italic;
    }
    .markdown-content img { max-width: 100%; border-radius: var(--radius); border: 1px solid var(--line); }

    @media (max-width: 900px) {
      .notebook-layout { grid-template-columns: 1fr; }
      .notebook-sidebar-col { order: -1; }
      .notebook-sidebar { position: static; max-height: none; }
      .notebook-content { padding: 1.5rem 1.25rem 2rem; }
    }
  </style>
</head>

  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>

  <script src="assets/js/notebook-renderer.js"></script>
  <script>
    // Sidebar toggle — same behavior as before, adapted to the new grid layout
    (function () {
      var sidebarToggle = document.getElementById('sidebarToggle');
      var toggleIcon = document.getElementById('toggleIcon');
      var contentWrapper = document.getElementById('notebookContentWrapper');
      var isCollapsed = localStorage.getItem('notebookSidebarCollapsed') === 'true';

      function apply() {
        contentWrapper.classList.toggle('sidebar-collapsed', isCollapsed);
        toggleIcon.classList.toggle('fa-bars', !isCollapsed);
        toggleIcon.classList.toggle('fa-chevron-right', isCollapsed);
        sidebarToggle.setAttribute('aria-expanded', String(!isCollapsed));
      }

      apply();
      sidebarToggle.addEventListener('click', function () {
        isCollapsed = !isCollapsed;
        apply();
        localStorage.setItem('notebookSidebarCollapsed', String(isCollapsed));
      });
    })();
  </script>
